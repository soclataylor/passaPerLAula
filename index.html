<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASSAPERL'AULA by Mariona Batalla Taylor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img src="passaperlaula.png" alt="PassaPerLaula" class="logo">
    <nav>
        <button id="comencar">Comença el Concurs</button>
        <button id="reset">Reiniciar Joc</button>
    </nav>
    
    <div class="rosco-container">
        <div class="rosco-section">
            <div id="rosco1" class="rosco">
                <div class="equip-name">Equip 1</div>
                <div id="timer1" class="rosco-info">Temps: 60s</div>
                <div id="encerts1" class="rosco-info">Encerts: 0</div>
                <div id="errors1" class="rosco-info">Errors: 0</div>
            </div>
            <div class="controls">
                <button id="encerta1">ENCERTA!</button>
                <button id="falla1">FALLA!</button>
                <button id="passa1">PASSA TORN</button>
            </div>
        </div>
        <div class="rosco-section">
            <div id="rosco2" class="rosco">
                <div class="equip-name">Equip 2</div>
                <div id="timer2" class="rosco-info">Temps: 60s</div>
                <div id="encerts2" class="rosco-info">Encerts: 0</div>
                <div id="errors2" class="rosco-info">Errors: 0</div>
            </div>
            <div class="controls">
                <button id="encerta2">ENCERTA!</button>
                <button id="falla2">FALLA!</button>
                <button id="passa2">PASSA TORN</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
